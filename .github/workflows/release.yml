name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  validate-installer:
    strategy:
      fail-fast: false
      matrix:
        runner: [windows-2022, windows-2025]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install Rust toolchain
        run: rustup show
      - name: Install dependencies
        run: npm ci
      - name: Build unsigned NSIS installer
        run: npm run tauri:build
      - name: Smoke-test installation
        shell: powershell
        run: |
          $installer = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          ./scripts/smoke-install.ps1 -Installer $installer.FullName
      - uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.runner }}
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

  publish:
    needs: validate-installer
    runs-on: windows-2022
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: installer-windows-2022
          path: release-assets
      - name: Create SHA-256 checksums
        shell: powershell
        run: |
          Get-ChildItem release-assets/*.exe | ForEach-Object {
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLowerInvariant()
            "$hash  $($_.Name)"
          } | Out-File -Encoding ascii release-assets/SHA256SUMS.txt
      - uses: actions/attest-build-provenance@v2
        with:
          subject-path: release-assets/*
      - name: Publish GitHub Release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" release-assets/* --title "Echo Player ${{ github.ref_name }}" --generate-notes --verify-tag
